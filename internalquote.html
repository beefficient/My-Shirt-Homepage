<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quote — My Shirt Printing</title>

  <!-- Same fonts as your site -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* === Theme copied to match your index.html palette & feel === */
    body.locked { overflow:hidden; }

    #loginOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #loginOverlay.hidden { display: none; }
    #loginOverlay .panel {
      width: min(420px, calc(100% - 40px));
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    :root{
      --bg: #f6fbff;
      --sky: #eaf4ff;
      --card: #ffffff;
      --text: #0f2a33;
      --muted: #47606a;
      --border: #d7e7f7;
      --primary: #032d44;
      --primary-2: #0b3f5b;
      --pill: 999px;
      --radius: 16px;
      --shadow: 0 10px 24px rgba(10,35,45,.08);
      --max: 1120px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #dfeeff 0%, #f6fbff 55%, #ffffff 100%);
      line-height: 1.55;
    }
    a{color:inherit;text-decoration:none}
    .container{max-width:var(--max);margin:0 auto;padding:0 20px}

    /* Top Nav (kept consistent with your site) */
    header{
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .navwrap{
      display:flex; align-items:center; justify-content:space-between;
      gap:16px; padding:14px 0;
    }
    .brand{display:flex; align-items:center; gap:12px; min-width:220px;}
    .brand img{height:42px; width:auto; object-fit:contain;}
    .brand .name{
      font-family:"DM Sans", Inter, sans-serif;
      font-weight:700; font-size:16px; letter-spacing:.2px; color:var(--primary-2);
      white-space:nowrap;
    }
    nav{display:flex; gap:18px; align-items:center; flex-wrap:wrap;}
    nav a{
      font-size:14px; color:var(--primary-2);
      padding:8px 10px; border-radius:10px; font-weight:600;
    }
    nav a:hover{background:var(--sky)}
    nav a.active{border-bottom:2px solid var(--primary); border-radius:0; padding-bottom:6px}

    /* Buttons */
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:11px 16px; border-radius:var(--pill);
      font-weight:700; border:1px solid transparent;
      cursor:pointer; user-select:none; white-space:nowrap; gap:8px;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .btn.primary{background:var(--primary); color:#fff; box-shadow:var(--shadow);}
    .btn.primary:hover{filter:brightness(.98)}
    .btn.ghost{background:#fff; border-color:var(--border); color:var(--primary-2)}
    .btn.ghost:hover{background:var(--sky)}
    .btn.small{padding:9px 12px; font-size:13px}

    /* Page */
    .hero{ padding: 26px 0 12px; position: relative; overflow: visible; }
    .hero::after{
      content:"";
      position:absolute;
      right:-260px; top:-120px;
      width:760px; height:760px;
      background: rgba(120,180,255,.18);
      border-radius:50%;
      pointer-events:none;
    }

    .page-title{
      position: relative;
      z-index: 1;
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      padding: 8px 0 6px;
    }

    .sheet{
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 10px 22px rgba(10,35,45,.06);
      overflow: hidden;
    }

    .actionbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 14px;
      border-bottom:1px solid var(--border);
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(8px);
    }
    .action-left{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
    .action-right{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}

    details.menu{position:relative;}
    details.menu > summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:11px 16px;
      border-radius: var(--pill);
      font-weight:700;
      border:1px solid var(--border);
      background:#fff;
      color:var(--primary-2);
      gap:8px;
    }
    details.menu > summary::-webkit-details-marker{display:none}
    details.menu > summary:hover{background:var(--sky)}
    .menuPanel{
      position:absolute;
      top: calc(100% + 10px);
      right: 0;
      min-width: 220px;
      background:#fff;
      border:1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 6px;
      z-index: 999;
    }
    .menuPanel button{
      width:100%;
      text-align:left;
      border:0;
      background:transparent;
      padding: 10px 12px;
      border-radius: 12px;
      font-weight:700;
      color: var(--primary-2);
      cursor:pointer;
      font-family: inherit;
    }
    .menuPanel button:hover{background: var(--sky);}

    .content{padding: 18px;}
    .topgrid{
      display:grid;
      grid-template-columns: 1.15fr .85fr;
      gap: 16px;
      align-items:start;
    }
    .box{
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      background:#fff;
    }
    .box h3{
      margin:0 0 8px;
      font-family:"DM Sans", Inter, sans-serif;
      color: var(--primary-2);
      font-size: 16px;
      letter-spacing: -.2px;
    }
    .label{
      font-size:12px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      color: var(--muted);
      margin-bottom:6px;
      display:block;
    }
    .field{
      width:100%;
      border:1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      background:#fff;
      color: var(--text);
      outline: none;
    }
    .field:focus{box-shadow: 0 0 0 4px rgba(120,180,255,.18); border-color:#b9d9f7}
    textarea.field{min-height: 92px; resize: vertical;}
    .row2{display:grid; grid-template-columns: 1fr 1fr; gap:10px;}
    .row3{display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;}
    .mono{font-family: var(--mono);}

    .tableWrap{
      margin-top: 14px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      overflow-y: hidden;
      background:#fff;
    }
    table{width:100%; border-collapse:collapse;}

    .items-table{
      min-width: 900px;
      table-layout: fixed;
    }
    thead th{
      text-align:left;
      background: var(--primary-2);
      color:#fff;
      padding: 12px 12px;
      font-size: 13px;
      letter-spacing:.04em;
      font-weight:800;
    }
    tbody td{
      padding: 10px 12px;
      border-bottom:1px solid var(--border);
      vertical-align: top;
      font-size: 14px;
    }
    tbody tr:last-child td{border-bottom:none;}
    .t-right{text-align:right;}

    .iconbtn{
      border:1px solid var(--border);
      background:#fff;
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
      font-weight:900;
      color: var(--primary-2);
    }
    .iconbtn:hover{background: var(--sky);}

    /* Print */
    @media print{
      .noPrintCell,
      .noPrintCell *{ display:none !important; visibility:hidden !important; }
      #moreMenu { display:none !important; }
      header, .actionbar { display:none !important; }
      .noPrint{ display:none !important; }
      #contactSearch, #contactResults, #btnAddNewCustomer { display:none !important; }
      #loginOverlay{ display:none !important; }
      #addItemBtnFallback{ display:none !important; }
      body{ background:#fff; }
      .hero{ padding: 0; }
      .sheet{ border:none; box-shadow:none; }
      *{ -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
    @page { size: Letter; margin: 14mm; }
  </style>
</head>

          <script>
          // Render order summary (Subtotal, Tax, Grand Total) into visible summary block
          function renderOrderSummary() {
            const tbody = document.getElementById("itemsBody");
            let subtotal = 0, tax = 0, grand = 0;
            if (tbody) {
              tbody.querySelectorAll("tr").forEach(tr => {
                subtotal += parseFloat(tr.dataset.amount || 0) || 0;
                tax += parseFloat(tr.dataset.tax || 0) || 0;
                grand += parseFloat(tr.dataset.total || 0) || 0;
              });
            }
            const money = n => (Number.isFinite(n) ? n : 0).toLocaleString(undefined, { style: "currency", currency: "USD" });
            const elSubtotal = document.getElementById("internalSubtotal");
            const elTax = document.getElementById("internalTax");
            const elGrand = document.getElementById("internalGrandTotal");
            if (elSubtotal && elTax && elGrand) {
              elSubtotal.textContent = money(subtotal);
              elTax.textContent = money(tax);
              elGrand.textContent = money(grand);
            }

            const legacyGrand = document.getElementById("grandTotalValue");
            if (legacyGrand) legacyGrand.textContent = money(grand);
          }
          </script>

      const isDiscount = (t) => String(t || "").trim().toLowerCase() === "discount";

      const type = $("itemType")?.value || "Product";
      const desc = ($("itemDesc")?.value || "").trim();
      const price = num($("itemPrice")?.value);
      const qty = Math.max(0, num($("itemQty")?.value || 1));
      let taxable = !!$("itemTaxable")?.checked;
      if (!desc){
        if (hint) hint.textContent = "Enter a description before adding.";
        $("itemDesc")?.focus();
        return;
      }
      if (isDiscount(type)) taxable = false;
      if (hint) hint.textContent = "";

      let amount = price * qty;
      if (isDiscount(type) && amount > 0) amount = -amount;
      const taxRate = ((num($("taxRate")?.value) || window.DEFAULT_TAX_RATE_PCT || 9.75) / 100) || 0;
      const tax = taxable && !isDiscount(type) ? amount * taxRate : 0;
      const total = amount + tax;

      const tr = document.createElement("tr");
      tr.dataset.type = type;
      tr.dataset.desc = desc;
      tr.dataset.price = String(price);
      tr.dataset.qty = String(qty);
      tr.dataset.amount = String(amount);
      tr.dataset.taxable = taxable ? "1" : "0";
      tr.dataset.tax = String(tax);
      tr.dataset.total = String(total);
      tr.innerHTML = `
        <td>${esc(type)}</td>
        <td>${esc(desc)}</td>
        <td class="t-right">${money(price)}</td>
        <td class="t-right">${String(qty)}</td>
        <td class="t-right">${money(amount)}</td>
        <td class="t-right" data-col="tax">${money(tax)}</td>
        <td class="t-right" data-col="total">${money(total)}</td>
        <td class="t-right noPrintCell">
          <button type="button" class="iconbtn" data-action="delete" title="Delete">✕</button>
        </td>
      `;
      tr.querySelector('[data-action="delete"]').addEventListener("click", (event) => {
        event.preventDefault();
        tr.remove();
        if (typeof window.renderOrderSummary === "function") window.renderOrderSummary();
      });
      tbody.appendChild(tr);
      if ($("itemDesc")) $("itemDesc").value = "";
      if ($("itemPrice")) $("itemPrice").value = "";
      if ($("itemQty")) $("itemQty").value = "1";
      if ($("itemType")) $("itemType").value = "Product";
      if ($("itemTaxable")) { $("itemTaxable").checked = true; $("itemTaxable").disabled = false; }
      $("itemDesc")?.focus();
      if (typeof window.renderOrderSummary === "function") window.renderOrderSummary();
      if ($("itemDesc")) $("itemDesc").value = "";
      if ($("itemPrice")) $("itemPrice").value = "";
      if ($("itemQty")) $("itemQty").value = "1";
      if ($("itemType")) $("itemType").value = "Product";
      if ($("itemTaxable")) { $("itemTaxable").checked = true; $("itemTaxable").disabled = false; }
      $("itemDesc")?.focus();
    };
  </script>

  <script>
    /* ================================
       2) CONTACT SEARCH (GOOGLE SHEETS) — ONE COPY
    ================================ */
    (function(){
      const API_KEY = "AIzaSyDj8ShpNncVN1mn3VtMZxt4UzEDYgyH-NY";
      const SPREADSHEET_ID = "1qkYwqASNdPOrINQC6KZJ3XRpy31VzCoWG7fF6YpXd18";
      const RANGE_A1 = "contacts!A1:J5000";

      const COL = {
        first: "First Name",
        last: "Last Name",
        contact: "Contact Name",
        phone: "Phone",
        email1: "Email 1",
        email2: "Email 2",
        address: "Address"
      };

      const $ = (id) => document.getElementById(id);

      function esc(s){
        return String(s ?? "")
          .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
          .replaceAll('"',"&quot;").replaceAll("'","&#039;");
      }

      function fullName(c){
        return [c[COL.first], c[COL.last]].filter(Boolean).join(" ").trim();
      }

      function hideResults(resultsEl){
        resultsEl.style.display = "none";
        resultsEl.innerHTML = "";
      }

      function pickContact(c){
        $("clientName").value  = fullName(c);
        $("clientEmail").value = ((c[COL.email1] || "").trim() || (c[COL.email2] || "").trim());
        $("clientAddr").value  = (c[COL.address] || "").trim();
        $("clientPhone").value = (c[COL.phone] || "").trim();

        const wrap = $("clientContactWrap");
        const contactEl = $("clientContact");
        const contactName = (c[COL.contact] || "").trim();
        if (wrap && contactEl) {
          if (contactName) { wrap.style.display = "block"; contactEl.value = contactName; }
          else { wrap.style.display = "none"; contactEl.value = ""; }
        }
      }

      async function loadContacts(){
        const url =
          `https://sheets.googleapis.com/v4/spreadsheets/${encodeURIComponent(SPREADSHEET_ID)}` +
          `/values/${encodeURIComponent(RANGE_A1)}?key=${encodeURIComponent(API_KEY)}`;

        const res = await fetch(url, { cache: "no-store" });
        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message || `Sheets error ${res.status}`);

        const values = data.values || [];
        if (values.length < 2) return [];

        const headers = values[0].map(h => String(h || "").trim());
        return values.slice(1).map(row => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = String(row[i] ?? "").trim());
          return obj;
        });
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const searchEl  = $("contactSearch");
        const resultsEl = $("contactResults");
        if (!searchEl || !resultsEl) return;

        let CONTACTS = [];
        let CONTACTS_ERROR = "";

        try { CONTACTS = await loadContacts(); CONTACTS_ERROR = ""; }
        catch (e){ CONTACTS = []; CONTACTS_ERROR = e?.message || "Could not load contacts."; console.error(CONTACTS_ERROR); }

        function showMessage(msg){
          resultsEl.innerHTML = `<div style="padding:10px 12px; font-weight:800; color:var(--muted);">${esc(msg)}</div>`;
          resultsEl.style.display = "block";
        }

        function showResults(list){
          resultsEl.innerHTML = "";
          list.slice(0, 12).forEach(c => {
            const top = fullName(c) || "Unnamed";
            const sub = [c[COL.email1] || c[COL.email2] || "", c[COL.phone] || ""].filter(Boolean).join(" • ");

            const btn = document.createElement("button");
            btn.type = "button";
            btn.style.width = "100%";
            btn.style.textAlign = "left";
            btn.style.border = "0";
            btn.style.background = "transparent";
            btn.style.padding = "10px 12px";
            btn.style.borderRadius = "12px";
            btn.style.cursor = "pointer";
            btn.innerHTML = `
              <div style="font-weight:900; color:var(--primary-2);">${esc(top)}</div>
              <div style="font-size:12px; font-weight:800; color:var(--muted); margin-top:2px;">${esc(sub)}</div>
            `;
            btn.addEventListener("mouseenter", () => btn.style.background = "var(--sky)");
            btn.addEventListener("mouseleave", () => btn.style.background = "transparent");
            btn.addEventListener("click", () => { pickContact(c); hideResults(resultsEl); });
            resultsEl.appendChild(btn);
          });

          resultsEl.style.display = list.length ? "block" : "none";
        }

        function matches(c, q){
          const query = q.trim().toLowerCase();
          if (!query) return false;
          const hay = [
            c[COL.first], c[COL.last], c[COL.contact],
            c[COL.email1], c[COL.email2], c[COL.phone], c[COL.address]
          ].join(" ").toLowerCase();
          return hay.includes(query);
        }

        let t = null;
        searchEl.addEventListener("input", () => {
          const q = searchEl.value.trim();
          clearTimeout(t);
          t = setTimeout(() => {
            if (!q) return hideResults(resultsEl);
            if (CONTACTS_ERROR) return showMessage("Contacts not available (check API key + sheet sharing).");

            const list = CONTACTS.filter(c => matches(c, q));
            if (!list.length) return showMessage(`No matches for "${q}"`);
            showResults(list);
          }, 70);
        });

        window.addEventListener("click", (e) => {
          const within = resultsEl.contains(e.target) || searchEl.contains(e.target);
          if (!within) hideResults(resultsEl);
        });
      });
    })();
  </script>

  <script>
    /* ================================
       3) LINE ITEMS (Add/Edit/Delete) — ONE COPY
    ================================ */
    (() => {
      console.log("✅ Line-item script loaded");

      let editingRow = null;
      const $ = (id) => document.getElementById(id);

      function toNum(v){
        const s = String(v ?? "").trim().replace(/[^0-9.-]/g,"");
        const n = parseFloat(s);
        return Number.isFinite(n) ? n : 0;
      }
      function moneyUSD(n){
        const x = Number(n);
        const safe = Number.isFinite(x) ? x : 0;
        return safe.toLocaleString(undefined, { style:"currency", currency:"USD" });
      }
      function esc(s){
        return String(s ?? "")
          .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
          .replaceAll('"',"&quot;").replaceAll("'","&#039;");
      }
      function isDiscountType(type){
        return String(type || "").trim().toLowerCase() === "discount";
      }
      function getTaxRatePct(){
        const value = toNum($("taxRate")?.value);
        return value > 0 ? value : (window.DEFAULT_TAX_RATE_PCT || 9.75);
      }

      function enforceEntryTaxableRules(){
        const typeEl = $("itemType");
        const taxableEl = $("itemTaxable");
        if (!typeEl || !taxableEl) return;

        if (isDiscountType(typeEl.value)){
          taxableEl.checked = false;
          taxableEl.disabled = true;
        } else {
          taxableEl.disabled = false;
        }
      }

      function calcAmount(type, price, qty){
        let amt = price * qty;
        if (isDiscountType(type) && amt > 0) amt = -amt;
        return amt;
      }
      function calcTax(amount, taxable, type){
        if (!taxable) return 0;
        if (isDiscountType(type)) return 0;
        const rate = (getTaxRatePct() / 100) || 0;
        return amount * rate;
      }

      function refreshTotals(){
        if (typeof window.renderOrderSummary === "function") {
          window.renderOrderSummary();
        }
      }

      function resetEntryFields(){
        if ($("itemDesc")) $("itemDesc").value = "";
        if ($("itemPrice")) $("itemPrice").value = "";
        if ($("itemQty")) $("itemQty").value = "1";
        if ($("itemType")) $("itemType").value = "Product";
        if ($("itemTaxable")) {
          $("itemTaxable").checked = true;
          $("itemTaxable").disabled = false;
        }
      }

      function recalcRow(tr){
        const type = tr.dataset.type || "Product";
        const price = parseFloat(tr.dataset.price || 0) || 0;
        const qty = parseFloat(tr.dataset.qty || 0) || 0;
        const taxable = tr.dataset.taxable === "1";
        const amount = calcAmount(type, price, qty);
        const tax = calcTax(amount, taxable, type);
        const total = amount + tax;

        tr.dataset.amount = String(amount);
        tr.dataset.tax = String(tax);
        tr.dataset.total = String(total);

        const cells = tr.querySelectorAll("td");
        if (cells[4]) cells[4].textContent = moneyUSD(amount);
        tr.querySelector("[data-col='tax']").textContent = moneyUSD(tax);
        tr.querySelector("[data-col='total']").textContent = moneyUSD(total);

        return { amount, tax, total };
      }

      function bindRowActions(tr){
        tr.querySelector('[data-action="edit"]')?.addEventListener("click", (e) => {
          e.preventDefault();
          startEditRow(tr);
        });

        tr.querySelector('[data-action="tax-toggle"]')?.addEventListener("click", (e) => {
          e.preventDefault();
          const nextTaxable = tr.dataset.taxable !== "1";
          tr.dataset.taxable = nextTaxable ? "1" : "0";
          recalcRow(tr);
          e.currentTarget.textContent = nextTaxable ? '🟩' : '⬜️';
          refreshTotals();
        });

        tr.querySelector('[data-action="delete"]')?.addEventListener("click", (e) => {
          e.preventDefault();
          if (editingRow === tr) stopEditMode();
          tr.remove();
          refreshTotals();
        });
      }

      function updateEntryPreview(){
        const type = $("itemType")?.value || "Product";
        const price = toNum($("itemPrice")?.value);
        const qty = Math.max(0, toNum($("itemQty")?.value || 1));
        const taxable = !!$("itemTaxable")?.checked;

        enforceEntryTaxableRules();

        const amount = calcAmount(type, price, qty);
        const tax = calcTax(amount, taxable, type);
        const total = amount + tax;

        $("itemAmountView") && ($("itemAmountView").textContent = moneyUSD(amount));
        $("itemTaxView") && ($("itemTaxView").textContent = moneyUSD(tax));
        $("itemTotalView") && ($("itemTotalView").textContent = moneyUSD(total));
      }

      function setButtonMode(editing){
        const btn = $("addItemBtn");
        if (!btn) return;
        btn.textContent = editing ? "Update Item" : "Add Item";
      }

      function startEditRow(tr){
        editingRow = tr;
        $("itemType").value = tr.dataset.type || "Product";
        $("itemDesc").value = tr.dataset.desc || "";
        $("itemPrice").value = tr.dataset.price || "";
        $("itemQty").value = tr.dataset.qty || "1";
        $("itemTaxable") && ($("itemTaxable").checked = (tr.dataset.taxable === "1"));

        setButtonMode(true);
        enforceEntryTaxableRules();
        updateEntryPreview();
        $("itemDesc")?.focus();
      }

      function stopEditMode(){
        editingRow = null;
        setButtonMode(false);
        updateEntryPreview();
      }

      function upsertLine(){
        const tbody = $("itemsBody");
        if (!tbody) return;

        const type = $("itemType")?.value || "Product";
        const desc = ($("itemDesc")?.value || "").trim();
        const price = toNum($("itemPrice")?.value);
        const qty = Math.max(0, toNum($("itemQty")?.value || 1));
        if (!desc){
          const hint = $("addItemHint");
          if (hint) hint.textContent = "Enter a description before adding.";
          $("itemDesc")?.focus();
          return;
        }
        const hint = $("addItemHint");
        if (hint) hint.textContent = "";

        let taxable = !!$("itemTaxable")?.checked;
        enforceEntryTaxableRules();
        if (isDiscountType(type)) taxable = false;

        const amount = calcAmount(type, price, qty);
        const tax = calcTax(amount, taxable, type);
        const total = amount + tax;

        // UPDATE
        if (editingRow){
          editingRow.dataset.type = type;
          editingRow.dataset.desc = desc;
          editingRow.dataset.price = String(price);
          editingRow.dataset.qty = String(qty);
          editingRow.dataset.amount = String(amount);
          editingRow.dataset.taxable = taxable ? "1" : "0";
          editingRow.dataset.tax = String(tax);
          editingRow.dataset.total = String(total);

          const tds = editingRow.querySelectorAll("td");
          tds[0].textContent = type;
          tds[1].textContent = desc;
          tds[2].textContent = moneyUSD(price);
          tds[3].textContent = String(qty);
          tds[4].textContent = moneyUSD(amount);
          editingRow.querySelector("[data-col='tax']").textContent = moneyUSD(tax);
          editingRow.querySelector("[data-col='total']").textContent = moneyUSD(total);

          stopEditMode();
          refreshTotals();
          return;
        }

        // ADD
        const tr = document.createElement("tr");
        tr.dataset.type = type;
        tr.dataset.desc = desc;
        tr.dataset.price = String(price);
        tr.dataset.qty = String(qty);
        tr.dataset.amount = String(amount);
        tr.dataset.taxable = taxable ? "1" : "0";
        tr.dataset.tax = String(tax);
        tr.dataset.total = String(total);

        tr.innerHTML = `
          <td>${esc(type)}</td>
          <td>${esc(desc)}</td>
          <td class="t-right">${moneyUSD(price)}</td>
          <td class="t-right">${String(qty)}</td>
          <td class="t-right">${moneyUSD(amount)}</td>
          <td class="t-right" data-col="tax">${moneyUSD(tax)}</td>
          <td class="t-right" data-col="total">${moneyUSD(total)}</td>
          <td class="t-right noPrintCell">
            <button type="button" class="iconbtn" data-action="edit" title="Edit">✏️</button>
            <button type="button" class="iconbtn" data-action="tax-toggle" title="Tax/No Tax" style="margin-left:6px;">${taxable ? '🟩' : '⬜️'}</button>
            <button type="button" class="iconbtn" data-action="delete" title="Delete" style="margin-left:6px;">✕</button>
          </td>
        `;

        bindRowActions(tr);

        tbody.appendChild(tr);

        resetEntryFields();

        updateEntryPreview();
        refreshTotals();
        $("itemDesc")?.focus();
      }

      function safeUpsert(e){
        e?.preventDefault?.();
        try {
          upsertLine();
        } catch (err) {
          console.error("Add item failed:", err);
          const hint = $("addItemHint");
          if (hint) hint.textContent = "Add failed. Check console for error details.";
        }
      }

      // Backup hook for inline button onclick if listener wiring is skipped.
      window.__lineItemsAdd = safeUpsert;

      function wire(){
        ["input","change","keyup","blur"].forEach(ev => {
          $("itemPrice")?.addEventListener(ev, updateEntryPreview);
          $("itemQty")?.addEventListener(ev, updateEntryPreview);
          $("itemTaxable")?.addEventListener(ev, updateEntryPreview);
        });

        $("itemType")?.addEventListener("change", () => {
          enforceEntryTaxableRules();
          updateEntryPreview();
        });

        if ($("taxRate") && !toNum($("taxRate").value)) {
          $("taxRate").value = String(window.DEFAULT_TAX_RATE_PCT || 9.75);
        }

        enforceEntryTaxableRules();
        updateEntryPreview();
        refreshTotals();
      }

      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", wire);
      else wire();

      // Expose helpers for quote load/save
      window.__getItems = function(){
        const rows = document.querySelectorAll("#itemsBody tr");
        return Array.from(rows).map(tr => ({
          type: tr.dataset.type,
          desc: tr.dataset.desc,
          price: parseFloat(tr.dataset.price || 0) || 0,
          qty: parseFloat(tr.dataset.qty || 0) || 0,
          amount: parseFloat(tr.dataset.amount || 0) || 0,
          taxable: tr.dataset.taxable === "1",
          tax: parseFloat(tr.dataset.tax || 0) || 0,
          total: parseFloat(tr.dataset.total || 0) || 0
        }));
      };

      window.__fillItems = function(items){
        const tbody = document.getElementById("itemsBody");
        if (!tbody) return;
        tbody.innerHTML = "";

        (Array.isArray(items) ? items : []).forEach(it => {
          const type = it.type || "Product";
          const desc = it.desc || "";
          const price = parseFloat(it.price || 0) || 0;
          const qty = parseFloat(it.qty || 0) || 0;
          const amount = parseFloat(it.amount || 0) || 0;
          const taxable = !!it.taxable;
          const tax = parseFloat(it.tax || 0) || 0;
          const total = parseFloat(it.total || 0) || 0;

          const tr = document.createElement("tr");
          tr.dataset.type = type;
          tr.dataset.desc = desc;
          tr.dataset.price = String(price);
          tr.dataset.qty = String(qty);
          tr.dataset.amount = String(amount);
          tr.dataset.taxable = taxable ? "1" : "0";
          tr.dataset.tax = String(tax);
          tr.dataset.total = String(total);

          tr.innerHTML = `
            <td>${esc(type)}</td>
            <td>${esc(desc)}</td>
            <td class="t-right">${moneyUSD(price)}</td>
            <td class="t-right">${String(qty)}</td>
            <td class="t-right">${moneyUSD(amount)}</td>
            <td class="t-right" data-col="tax">${moneyUSD(tax)}</td>
            <td class="t-right" data-col="total">${moneyUSD(total)}</td>
            <td class="t-right noPrintCell">
              <button type="button" class="iconbtn" data-action="edit" title="Edit">✏️</button>
              <button type="button" class="iconbtn" data-action="tax-toggle" title="Tax/No Tax" style="margin-left:6px;">${taxable ? '🟩' : '⬜️'}</button>
              <button type="button" class="iconbtn" data-action="delete" title="Delete" style="margin-left:6px;">✕</button>
            </td>
          `;

          bindRowActions(tr);

          tbody.appendChild(tr);
        });

        refreshTotals();
      };
    })();
  </script>

  <script>
  /* ================================
     QUOTE SAVE / LOAD SYSTEM
     - Creates saveQuote()
     - Wires Save button
     - Re-fetches quote_number after insert
  ================================ */

  (function(){

    const qs = (id) => document.getElementById(id);

    window.currentQuoteId = null;

    function getQuotePayload(){
      const items = (window.__getItems && typeof window.__getItems === 'function') ? window.__getItems() : [];
      return {
        quote_date: document.getElementById("invDate")?.value || null,
        client_name: document.getElementById("clientName")?.value?.trim() || null,
        client_email: document.getElementById("clientEmail")?.value?.trim() || null,
        client_addr: document.getElementById("clientAddr")?.value?.trim() || null,
        client_phone: document.getElementById("clientPhone")?.value?.trim() || null,
        biz_name: document.getElementById("bizName")?.value?.trim() || null,
        biz_email: document.getElementById("bizEmail")?.value?.trim() || null,
        biz_phone: document.getElementById("bizPhone")?.value?.trim() || null,
        biz_addr: document.getElementById("bizAddr")?.value?.trim() || null,
        biz_city: document.getElementById("bizCity")?.value?.trim() || null,
        notes: document.getElementById("notes")?.value?.trim() || null,
        terms: document.getElementById("terms")?.value?.trim() || null,
        items: items
      };
    }

    async function saveQuote(){

      if (!window.sb) {
        alert("Supabase client not initialized.");
        return null;
      }

      const payload = getQuotePayload();

      let savedRow;

      // UPDATE
      if (window.currentQuoteId){
        console.log('[Supabase] UPDATE quotes', { id: window.currentQuoteId, payload });
        const { data, error } = await window.sb
          .from("quotes")
          .update(payload)
          .eq("id", window.currentQuoteId)
          .select("*")
          .limit(1)
          .maybeSingle();

        if (error){
          console.error('[Supabase ERROR] UPDATE quotes', error);
          alert('Could not update quote. Please try again.');
          return null;
        }

        savedRow = data;
      }

      // INSERT
      else {
        // First, insert into customer_quotes to obtain the canonical numeric quote_no
        const custPayload = Object.assign({}, payload);
        // include items if present
        if (window.__getItems && typeof window.__getItems === 'function') {
          custPayload.items = window.__getItems();
        }

        console.log('[Supabase] INSERT customer_quotes', { custPayload });
        const { data: custData, error: custError } = await window.sb
          .from("customer_quotes")
          .insert({ name: document.getElementById("clientName")?.value?.trim() || null,
                    phone: document.getElementById("clientPhone")?.value?.trim() || null,
                    email: document.getElementById("clientEmail")?.value?.trim() || null,
                    payload: custPayload })
          .select("id, quote_no")
          .limit(1)
          .maybeSingle();

        if (custError) {
          console.error('[Supabase ERROR] INSERT customer_quotes', custError);
          alert('Could not reserve quote number. Please try again.');
          return null;
        }

        const reservedQuoteNo = custData?.quote_no;

        // Now insert into internal `quotes` table. `quotes` expects `quote_number` (string),
        // so store the reserved numeric value as `quote_number` to avoid schema mismatch.
        const rowToInsert = Object.assign({}, payload, { quote_number: String(reservedQuoteNo) });

        console.log('[Supabase] INSERT quotes', { rowToInsert });
        const { data, error } = await window.sb
          .from("quotes")
          .insert(rowToInsert)
          .select("*")
          .limit(1)
          .maybeSingle();

        if (error){
          console.error('[Supabase ERROR] INSERT quotes', error);
          alert('Could not save quote. Please try again.');
          return null;
        }

        savedRow = data;
      }

      // Store current ID
      window.currentQuoteId = savedRow.id;

      // Put generated quote number into the field (numeric string from reservedQuoteNo or savedRow)
      const displayQuoteNo = typeof reservedQuoteNo !== 'undefined' ? String(reservedQuoteNo) : (savedRow && (savedRow.quote_number || savedRow.quote_no) ? String(savedRow.quote_number || savedRow.quote_no) : "");
      if (qs("invNo")) qs("invNo").value = displayQuoteNo;

      // ✅ Mirror to Google Sheet (internal_quotes tab)
      mirrorInternalQuoteToSheet({
        created_at: new Date().toISOString(),
        // Use the reserved numeric quote (from customer_quotes) for the sheet mirror
        quote_no: displayQuoteNo,
        status: "draft",
        customer_name: document.getElementById("clientName")?.value?.trim() || "",
        customer_email: document.getElementById("clientEmail")?.value?.trim() || "",
        customer_phone: document.getElementById("clientPhone")?.value?.trim() || "",
        customer_address: document.getElementById("clientAddr")?.value?.trim() || "",
        business_name: document.getElementById("bizName")?.value?.trim() || "",
        business_email: document.getElementById("bizEmail")?.value?.trim() || "",
        business_phone: document.getElementById("bizPhone")?.value?.trim() || "",
        business_address: document.getElementById("bizAddr")?.value?.trim() || "",
        business_city: document.getElementById("bizCity")?.value?.trim() || "",
        tax_rate: document.getElementById("taxRate")?.value || String(window.DEFAULT_TAX_RATE_PCT || 9.75),
        subtotal: "",
        tax: "",
        total: "",
        items_json: JSON.stringify(payload.items || []),
        notes: document.getElementById("notes")?.value?.trim() || "",
        terms: document.getElementById("terms")?.value?.trim() || "",
        supabase_quote_id: savedRow.id
      });

      // Keep URL synced
      const url = new URL(window.location.href);
      url.searchParams.set("id", savedRow.id);
      history.replaceState({}, "", url.toString());

      alert("Saved ✅");
      console.log("✅ Quote saved:", savedRow);

      return savedRow;
    }

    window.saveQuote = saveQuote;

    async function loadQuote(id){
      if (!window.sb) return;


      console.log('[Supabase] LOAD quotes by id', { id });
      const { data, error } = await window.sb
        .from("quotes")
        .select("*")
        .eq("id", id)
        .limit(1)
        .maybeSingle();

      if (error){
        console.error('[Supabase ERROR] LOAD quotes by id', error);
        alert('Could not load quote. Please try again.');
        return;
      }

      window.currentQuoteId = data.id;

      if (qs("invNo")) qs("invNo").value = data.quote_number || "";
      if (qs("invDate")) qs("invDate").value = data.quote_date || "";

      if (qs("clientName")) qs("clientName").value = data.client_name || "";
      if (qs("clientEmail")) qs("clientEmail").value = data.client_email || "";
      if (qs("clientPhone")) qs("clientPhone").value = data.client_phone || "";
      if (qs("clientAddr")) qs("clientAddr").value = data.client_addr || "";
      if (qs("clientContact")) qs("clientContact").value = data.client_contact || "";

      if (qs("notes")) qs("notes").value = data.notes || "";
      if (qs("terms")) qs("terms").value = data.terms || "";
      if (qs("taxRate")) qs("taxRate").value = data.tax_rate || String(window.DEFAULT_TAX_RATE_PCT || 9.75);

      if (window.__fillItems){
        window.__fillItems(Array.isArray(data.items) ? data.items : []);
      }
    }

    window.loadQuote = loadQuote;

    // Load a quote by its quote_number (the numeric string shown in `invNo`).
    async function loadQuoteByNumber(quoteNumber){
      if (!window.sb) { alert('Supabase client not initialized.'); return null; }
      const q = String((quoteNumber || qs('invNo')?.value || '')).trim();
      if (!q){ alert('Enter a quote number to load.'); return null; }

      // Try to match trailing digits like invoice loader does
      const tailMatch = String(q).trim().match(/(\d+)$/);
      const tailDigits = tailMatch ? tailMatch[1] : null;

      // 1) Try customer_quotes (numeric quote_no) if we have tail digits
      if (tailDigits){
        const numericQuoteNo = parseInt(tailDigits, 10);
        if (Number.isFinite(numericQuoteNo)){
          try {
            const { data, error } = await window.sb
              .from('customer_quotes')
              .select('*')
              .eq('quote_no', numericQuoteNo)
              .order('created_at', { ascending: false })
              .limit(1)
              .maybeSingle();

            if (error) throw error;
            if (data){
              // normalize payload
              if (typeof data.payload === 'string'){
                try { data.payload = JSON.parse(data.payload); } catch { data.payload = {}; }
              }
              fillFromCustomerQuote(data);
              window.CURRENT_QUOTE = data;
              return data.id || null;
            }
          } catch (err){ console.warn('customer_quotes lookup failed', err); }
        }
      }

      // 2) Fallback: look in `quotes` table by quote_number string
      try {
        const { data, error } = await window.sb
          .from('quotes')
          .select('*')
          .eq('quote_number', q)
          .limit(1)
          .maybeSingle();

        if (error){ console.error(error); alert(error.message || 'Lookup failed'); return null; }
        if (!data){ alert('Quote not found: ' + q); return null; }

        // Populate form using the internal quotes row
        window.currentQuoteId = data.id;
        if (qs('invNo')) qs('invNo').value = data.quote_number || '';
        if (qs('invDate')) qs('invDate').value = data.quote_date || '';
        if (qs('clientName')) qs('clientName').value = data.client_name || '';
        if (qs('clientEmail')) qs('clientEmail').value = data.client_email || '';
        if (qs('clientPhone')) qs('clientPhone').value = data.client_phone || '';
        if (qs('clientAddr')) qs('clientAddr').value = data.client_addr || '';
        if (qs('notes')) qs('notes').value = data.notes || '';
        if (qs('terms')) qs('terms').value = data.terms || '';
        if (qs('taxRate')) qs('taxRate').value = data.tax_rate || String(window.DEFAULT_TAX_RATE_PCT || 9.75);
        if (window.__fillItems) window.__fillItems(Array.isArray(data.items) ? data.items : []);

        alert('Quote loaded ✅');
        return data.id;
      } catch (err){ console.error('Lookup error', err); alert('Lookup failed'); return null; }
    }

    // Populate the internal quote form using a `customer_quotes`-style object
    function fillFromCustomerQuote(q){
      try {
        // `q` shape may vary: { quote_no, name, email, phone, notes, payload }
        const quoteNo = q.quote_no || q.quote_no_raw || q.quote_no_raw || qs('invNo')?.value || '';
        if (qs('invNo')) qs('invNo').value = String(quoteNo || '').trim();

        // payload may be nested under `payload` or be the object itself
        const payload = (q.payload && typeof q.payload === 'object') ? q.payload : (q.payload ? JSON.parse(q.payload || '{}') : (q || {}));

        if (qs('clientName')) qs('clientName').value = q.name || payload.client_name || payload.name || '';
        if (qs('clientEmail')) qs('clientEmail').value = q.email || payload.client_email || payload.email || '';
        if (qs('clientPhone')) qs('clientPhone').value = q.phone || payload.client_phone || payload.phone || '';
        if (qs('clientAddr')) qs('clientAddr').value = payload.client_addr || payload.address || '';
        if (qs('notes')) qs('notes').value = q.notes || payload.notes || '';
        if (qs('terms')) qs('terms').value = payload.terms || '';
        if (qs('invDate')) qs('invDate').value = payload.quote_date || '';
        if (qs('taxRate')) qs('taxRate').value = payload.tax_rate || q.tax_rate || String(window.DEFAULT_TAX_RATE_PCT || 9.75);

        // Items: normalize common payload shapes into internal line-item format
        if (window.__fillItems){
          const rawItems = payload.items || payload.line_items || payload.lineItems || payload.pricing_items || payload.invoice_items || (q.payload && q.payload.items) || [];
          const norm = normalizeQuoteItems(Array.isArray(rawItems) ? rawItems : []);
          if (norm && norm.length) window.__fillItems(norm);
        }

        // Clear currentQuoteId because this record may come from a different table
        window.currentQuoteId = q.id || null;
        alert('Quote loaded ✅');
      } catch (err){ console.error('fillFromCustomerQuote failed', err); alert('Failed to populate quote'); }
    }

    // Normalize various quote item shapes (from invoice payloads or sheets)
    function normalizeQuoteItems(items){
      const toNum = (v) => {
        if (v == null) return 0;
        if (typeof v === 'number') return v;
        const s = String(v).replace(/[^0-9.-]/g, '');
        const n = parseFloat(s);
        return Number.isFinite(n) ? n : 0;
      };

      return (Array.isArray(items) ? items : []).map(it => {
        // common label/description fields
        const desc = String(it.product || it.desc || it.description || it.label || it.name || it.item || it.title || '').trim();

        // common price fields
        const rawUnit = (it.unit_price ?? it.unitPrice ?? it.price ?? it.amount);
        let unitPrice = toNum(rawUnit);
        // if price appears stored in cents under *_cents fields
        if (!unitPrice){
          if (it.unit_price_cents) unitPrice = toNum(it.unit_price_cents) / 100;
          else if (it.price_cents) unitPrice = toNum(it.price_cents) / 100;
        }

        const qty = Math.max(0, toNum(it.qty ?? it.quantity ?? it.count ?? it.qty_count ?? 1));
        const taxable = (typeof it.taxable === 'boolean') ? it.taxable : (it.taxable == null ? true : !!it.taxable);

        const amount = unitPrice * qty;
        const taxRate = (toNum(document.getElementById('taxRate')?.value) || 0) / 100;
        const tax = (taxable && !/discount/i.test(it.type || it.label || desc)) ? amount * taxRate : 0;
        const total = amount + tax;

        // Decide type
        let type = String(it.type || it.item_type || it.category || '').trim();
        if (!type){
          if (/garment|shirt|hoodie|tee|product/i.test(desc)) type = 'Product';
          else if (/discount/i.test(desc)) type = 'Discount';
          else type = 'Services';
        }

        return {
          type,
          desc: desc,
          price: Number(unitPrice || 0),
          qty: Number(qty || 0),
          amount: Number(amount || 0),
          taxable: !!taxable,
          tax: Number(tax || 0),
          total: Number(total || 0)
        };
      }).filter(it => it.desc || it.price || it.qty);
    }

    // Wire Save button
    document.addEventListener("DOMContentLoaded", () => {

      const btn = document.getElementById("btnSave");
      if (!btn){
        console.warn("btnSave not found");
        return;
      }

      btn.addEventListener("click", async (e) => {
        e.preventDefault();
        await saveQuote();
      });

      // Wire the new Load-by-quote-number button
      const loadBtn = document.getElementById('btnLoadQuoteNo');
      if (loadBtn){
        loadBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          let q = qs('invNo')?.value?.trim() || '';
          if (!q) q = prompt('Enter quote number to load:');
          if (!q) return;
          qs('invNo').value = q;

          // Try to reuse invoice.html's loader if available (cleanest)
          try {
            if (typeof window.loadQuoteByNumberFromSheet === 'function'){
              try {
                const quote = await window.loadQuoteByNumberFromSheet(q);
                if (quote) { fillFromCustomerQuote(quote); return; }
              } catch (err) {
                console.warn('Sheet loader failed, falling back:', err?.message || err);
              }
            }

            if (typeof window.loadQuoteByNumber === 'function'){
              try {
                const quote = await window.loadQuoteByNumber(q);
                if (quote) { fillFromCustomerQuote(quote); return; }
              } catch (err) {
                console.warn('Invoice loader failed, falling back:', err?.message || err);
              }
            }
          } catch (e){ console.error('External loader attempt failed', e); }

          // Final fallback: local lookup in `quotes` table by quote_number
          await loadQuoteByNumber(q);
        });
      }

    });

  })();
  </script>

  /* =========================
     MIRROR INTERNAL QUOTE -> GOOGLE SHEET

  window.MIRROR_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyK3LZVt_91OIPLoWMTM7cf21t_h9sjM46qiGYJll49b9fwV2OdUZM0GLP6hx0FFMaJ/exec"; // same /exec as customer quotes mirror
; // same /exec as customer quotes mirror
  window.MIRROR_SECRET = "myshirt_customer_quote_2026"; // your Apps Script secret (NOT Supabase)

  async function mirrorInternalQuoteToSheet(row){
    if (!window.MIRROR_WEBAPP_URL) return console.warn("Missing MIRROR_WEBAPP_URL");
    const body = new URLSearchParams({
      secret: window.MIRROR_SECRET,
      source: "internal",                 // tells Apps Script which tab to use
      ...row
    });

    const res = await fetch(window.MIRROR_WEBAPP_URL, { method:"POST", body });
    const text = await res.text();

    try {
      const json = JSON.parse(text);
      if (!json.ok) console.error("Mirror failed:", json);
      return json;
    } catch {
      console.error("Mirror non-JSON response:", text);
      return { ok:false, raw:text };
    }
  }
  </script>
